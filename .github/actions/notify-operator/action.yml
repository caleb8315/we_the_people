name: Notify operator
description: >
  Email the operator when a scheduled job fails at the infrastructure level
  (checkout, npm ci, timeouts, or a non-zero worker exit). Complements the
  in-app engine_run alerts, which only fire once the worker is actually
  running. Delivery is best-effort via Resend or Brevo — whichever key is set.

inputs:
  job:
    description: Human-readable job name (e.g. "Ingest").
    required: true
  resend_api_key:
    description: Resend API key (optional).
    required: false
    default: ''
  brevo_api_key:
    description: Brevo API key (optional).
    required: false
    default: ''
  alert_email:
    description: Recipient address.
    required: false
    default: 'calebphillips.ai@gmail.com'
  from_email:
    description: Sender address.
    required: false
    default: 'alerts@crosscheck.news'
  run_url:
    description: Link to the failing Actions run.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Send failure email
      shell: bash
      env:
        JOB: ${{ inputs.job }}
        RESEND_API_KEY: ${{ inputs.resend_api_key }}
        BREVO_API_KEY: ${{ inputs.brevo_api_key }}
        ALERT_EMAIL: ${{ inputs.alert_email }}
        FROM_EMAIL: ${{ inputs.from_email }}
        RUN_URL: ${{ inputs.run_url }}
      run: |
        set -uo pipefail
        SUBJECT="[Crosscheck ERROR] ${JOB} workflow failed"
        BODY="The scheduled '${JOB}' GitHub Actions workflow failed. Investigate the run: ${RUN_URL}"

        if [ -n "${RESEND_API_KEY}" ]; then
          echo "Sending failure alert via Resend..."
          code=$(curl -s -o /tmp/resend_resp.json -w '%{http_code}' -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H 'Content-Type: application/json' \
            --data "$(jq -n --arg from "Crosscheck Alerts <${FROM_EMAIL}>" --arg to "${ALERT_EMAIL}" --arg subject "${SUBJECT}" --arg text "${BODY}" '{from:$from, to:[$to], subject:$subject, text:$text}')" || true)
          echo "Resend HTTP ${code}"; cat /tmp/resend_resp.json 2>/dev/null || true
          if [ "${code}" = "200" ] || [ "${code}" = "201" ]; then exit 0; fi
        fi

        if [ -n "${BREVO_API_KEY}" ]; then
          echo "Sending failure alert via Brevo..."
          code=$(curl -s -o /tmp/brevo_resp.json -w '%{http_code}' -X POST 'https://api.brevo.com/v3/smtp/email' \
            -H "api-key: ${BREVO_API_KEY}" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            --data "$(jq -n --arg femail "${FROM_EMAIL}" --arg to "${ALERT_EMAIL}" --arg subject "${SUBJECT}" --arg text "${BODY}" '{sender:{email:$femail,name:"Crosscheck Alerts"}, to:[{email:$to}], subject:$subject, textContent:$text}')" || true)
          echo "Brevo HTTP ${code}"; cat /tmp/brevo_resp.json 2>/dev/null || true
          if [ "${code}" = "200" ] || [ "${code}" = "201" ]; then exit 0; fi
        fi

        echo "::warning::No email channel delivered the failure alert. Set RESEND_API_KEY or BREVO_API_KEY as repo secrets to receive '${JOB}' failure emails."
        # Do not fail the notify step itself — the job is already failed.
        exit 0
