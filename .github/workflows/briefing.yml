name: Briefing

on:
  schedule:
    - cron: '0 7 * * *'    # 07:00 UTC daily
    - cron: '0 14 * * 0'   # 14:00 UTC Sunday (weekly)
  workflow_dispatch:
    inputs:
      kind:
        description: 'daily or weekly'
        required: true
        default: 'daily'

concurrency:
  group: briefing-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      OPERATOR_ALERT_EMAIL: ${{ vars.OPERATOR_ALERT_EMAIL || 'calebphillips.ai@gmail.com' }}
      ALERT_FROM_EMAIL: ${{ vars.ALERT_FROM_EMAIL || 'alerts@crosscheck.news' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_OPERATOR_CHAT_ID: ${{ secrets.TELEGRAM_OPERATOR_CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MAX_DAILY_LLM_CALLS: ${{ vars.MAX_DAILY_LLM_CALLS || '200' }}
      MAX_DAILY_LLM_CALLS_BRIEFING: ${{ vars.MAX_DAILY_LLM_CALLS_BRIEFING || '20' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run briefing
        run: |
          kind="${{ github.event.inputs.kind }}"
          if [ -z "$kind" ]; then
            if [ "${{ github.event.schedule }}" = "0 14 * * 0" ]; then kind=weekly; else kind=daily; fi
          fi
          npm run brief -- "$kind"
      - name: Alert operator on failure
        if: failure()
        uses: ./.github/actions/notify-operator
        with:
          job: Briefing
          resend_api_key: ${{ secrets.RESEND_API_KEY }}
          brevo_api_key: ${{ secrets.BREVO_API_KEY }}
          alert_email: ${{ vars.OPERATOR_ALERT_EMAIL || 'calebphillips.ai@gmail.com' }}
          from_email: ${{ vars.ALERT_FROM_EMAIL || 'alerts@crosscheck.news' }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
