name: Sensors fast lane

# Polls only the low-latency sensor adapters (USGS earthquakes, NASA EONET
# natural events, NOAA weather alerts, SWPC space-weather alerts, CISA KEV
# active-exploitation list). All five are free with very generous request
# budgets, so a 5-minute cadence is well within fair-use.
#
# The full ingest workflow (every 15 minutes) still re-runs all adapters
# including these five — this fast lane just shortens the publish-to-feed
# latency for the events readers care most about (quakes, severe weather,
# active exploits).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  # Use the same group as main ingest so runs serialize against each other.
  # This avoids race conditions on shared source/signal rows and prevents
  # scheduled runs from canceling each other mid-flight.
  group: ingest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # No LLM keys — the fast lane is intentionally LLM-free. Sensor
      # signals are deterministic, so reliability scoring works without
      # any model call. This keeps the fast-lane workflow zero-cost
      # even at 12 runs/hour.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run --workspace apps/worker ingest:fast
