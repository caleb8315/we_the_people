name: Develop signals

# Periodically enriches the top-priority developing/unverified signals
# using the live-corroboration fan-out (web search + Reddit + Bluesky +
# Wikipedia + GDELT + sensor networks). Runs by calling the deployed
# web app's /api/signal/:id/develop endpoint, so Firecrawl / Brave /
# Bluesky creds stay on the web side only.
#
# Cadence: every 15 minutes at :11 / :26 / :41 / :56 (offset from ingest's
# */15 cadence) so low-source signals get enriched quickly without waiting on
# a manual "find more sources" click.
# Per run: up to 12 stale signals by default, spaced 6s apart.
# This is the "automatic enrichment" path — see the note in
# apps/worker/src/jobs/develop.ts for why we don't enrich every signal
# at ingest time.
#
# 15-minute cadence is used so developing single-source stories are
# re-checked quickly. The endpoint is still rate-limited per-signal
# (cooldown), so this schedule does not repeatedly hit freshly-enriched
# signals.

on:
  schedule:
    - cron: '11,26,41,56 * * * *'
  workflow_dispatch:
    inputs:
      max:
        description: 'Max signals to enrich this run'
        required: false
        default: '12'
      thin:
        description: 'Prioritize signals with source_count <= this value'
        required: false
        default: '2'
      dry_run:
        description: 'If "true", list candidates without calling the endpoint'
        required: false
        default: 'false'

concurrency:
  group: develop
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      WORKER_SHARED_SECRET: ${{ secrets.WORKER_SHARED_SECRET }}
      # The worker calls POST $WEB_APP_URL/api/signal/:id/develop. That
      # endpoint holds the Firecrawl / Brave / Bluesky credentials on
      # the web side; the shared secret authenticates worker traffic.
      WEB_APP_URL: ${{ vars.WEB_APP_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      OPERATOR_ALERT_EMAIL: ${{ vars.OPERATOR_ALERT_EMAIL || 'calebphillips.ai@gmail.com' }}
      ALERT_FROM_EMAIL: ${{ vars.ALERT_FROM_EMAIL || 'alerts@crosscheck.news' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_OPERATOR_CHAT_ID: ${{ secrets.TELEGRAM_OPERATOR_CHAT_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run develop
        run: |
          max="${{ github.event.inputs.max || '12' }}"
          thin="${{ github.event.inputs.thin || '2' }}"
          dry="${{ github.event.inputs.dry_run || 'false' }}"
          args="--max=$max --thin=$thin"
          if [ "$dry" = "true" ]; then args="$args --dry-run"; fi
          npm run develop -- $args
      - name: Alert operator on failure
        if: failure()
        uses: ./.github/actions/notify-operator
        with:
          job: Develop signals
          resend_api_key: ${{ secrets.RESEND_API_KEY }}
          brevo_api_key: ${{ secrets.BREVO_API_KEY }}
          alert_email: ${{ vars.OPERATOR_ALERT_EMAIL || 'calebphillips.ai@gmail.com' }}
          from_email: ${{ vars.ALERT_FROM_EMAIL || 'alerts@crosscheck.news' }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
