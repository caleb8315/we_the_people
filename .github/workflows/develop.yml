name: Develop signals

# Periodically enriches the top-priority developing/unverified signals
# using the live-corroboration fan-out (web search + Reddit + Bluesky +
# Wikipedia + GDELT + sensor networks). Runs by calling the deployed
# web app's /api/signal/:id/develop endpoint, so Firecrawl / Brave /
# Bluesky creds stay on the web side only.
#
# Cadence: every 30 minutes at :07 / :37 (offset from ingest's */15).
# Per run: up to 8 stale signals by default, spaced 6s apart.
# This is the "automatic enrichment" path — see the note in
# apps/worker/src/jobs/develop.ts for why we don't enrich every signal
# at ingest time.
#
# 30 minutes was chosen so that a developing single-source story has a
# realistic shot at being corroborated within an hour of first
# surfacing. The endpoint is rate-limited per-signal (cooldown) so
# bumping the schedule does not cause repeat work for fresh enrichments.

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:
    inputs:
      max:
        description: 'Max signals to enrich this run'
        required: false
        default: '6'
      dry_run:
        description: 'If "true", list candidates without calling the endpoint'
        required: false
        default: 'false'

concurrency:
  group: develop
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      WORKER_SHARED_SECRET: ${{ secrets.WORKER_SHARED_SECRET }}
      # The worker calls POST $WEB_APP_URL/api/signal/:id/develop. That
      # endpoint holds the Firecrawl / Brave / Bluesky credentials on
      # the web side; the shared secret authenticates worker traffic.
      WEB_APP_URL: ${{ vars.WEB_APP_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run develop
        run: |
          max="${{ github.event.inputs.max || '8' }}"
          dry="${{ github.event.inputs.dry_run || 'false' }}"
          args="--max=$max"
          if [ "$dry" = "true" ]; then args="$args --dry-run"; fi
          npm run develop -- $args
