name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (workspaces)
        run: npm run typecheck
      - name: Lint (workspaces)
        run: npm run lint
      - name: Test (workspaces)
        run: npm run test
