name: Ingest

on:
  # Every 15 minutes. Free-tier APIs (GDELT, USGS, NASA EONET, NOAA,
  # Reddit, RSS feeds) all comfortably allow this cadence; dedupe is
  # content-keyed so re-fetching the same articles is cheap.
  # GitHub's free-tier cron drifts by 5–15 minutes during peak hours,
  # so the effective cadence is closer to 15–30 minutes — still 2-4x
  # faster than the previous hourly run.
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: ingest
  # Queue instead of cancel so long-running runs don't get killed by the
  # next schedule tick (which shows up as "operation was canceled").
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      OPERATOR_ALERT_EMAIL: ${{ vars.OPERATOR_ALERT_EMAIL || 'calebphillips.ai@gmail.com' }}
      ALERT_FROM_EMAIL: ${{ vars.ALERT_FROM_EMAIL || 'alerts@crosscheck.news' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_OPERATOR_CHAT_ID: ${{ secrets.TELEGRAM_OPERATOR_CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MAX_DAILY_LLM_CALLS: ${{ vars.MAX_DAILY_LLM_CALLS || '200' }}
      MAX_DAILY_LLM_CALLS_SIGNALS: ${{ vars.MAX_DAILY_LLM_CALLS_SIGNALS || '150' }}
      MAX_DAILY_LLM_CALLS_BRIEFING: ${{ vars.MAX_DAILY_LLM_CALLS_BRIEFING || '20' }}
      MAX_DAILY_LLM_CALLS_CONTRADICTION: ${{ vars.MAX_DAILY_LLM_CALLS_CONTRADICTION || '30' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run ingest
      - name: Alert operator on failure
        if: failure()
        uses: ./.github/actions/notify-operator
        with:
          job: Ingest
          resend_api_key: ${{ secrets.RESEND_API_KEY }}
          brevo_api_key: ${{ secrets.BREVO_API_KEY }}
          alert_email: ${{ vars.OPERATOR_ALERT_EMAIL || 'calebphillips.ai@gmail.com' }}
          from_email: ${{ vars.ALERT_FROM_EMAIL || 'alerts@crosscheck.news' }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
